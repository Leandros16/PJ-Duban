  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

plate-columns: repeat(3, 1fr);\n  gap: 28px;\n  margin-top: 60px;\n}\n#testimonials .testi-card {\n  background: var(--bg3);\n  border: 1px solid var(--border);\n  padding: 40px 36px;\n  display: flex;\n  flex-direction: column;\n  gap: 24px;\n  transition: border-color 0.2s;\n}\n#testimonials .testi-card:hover { border-color: var(--gold); }\n#testimonials .testi-quote {\n  font-size: 16px;\n  color: var(--white);\n  font-weight: 300;\n  line-height: 1.8;\n  font-style: italic;\n  flex: 1;\n}\n#testimonials .testi-quote::before {\n  content: '\"';\n  font-size: 48px;\n  color: var(--gold);\n  font-style: normal;\n  font-weight: 800;\n  line-height: 0;\n  display: block;\n  margin-bottom: 16px;\n  margin-top: 8px;\n}\n#testimonials .testi-author {\n  border-top: 1px solid var(--border);\n  padding-top: 20px;\n}\n#testimonials .testi-name {\n  font-size: 14px;\n  font-weight: 700;\n  color: var(--white);\n  margin-bottom: 4px;\n}\n#testimonials .testi-role {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--gold2);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n\n/* ── CONTACT ── */\n#contact {\n  background: var(--bg);\n  padding: 140px 60px;\n  position: relative;\n  overflow: hidden;\n}\n#contact::before {\n  content: '';\n  position: absolute;\n  top: -200px; right: -200px;\n  width: 700px; height: 700px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(201,146,42,0.08) 0%, transparent 65%);\n  pointer-events: none;\n}\n#contact .contact-inner {\n  max-width: 800px;\n  position: relative; z-index: 1;\n}\n#contact .contact-heading {\n  font-family: var(--display);\n  font-size: clamp(52px, 6vw, 80px);\n  font-weight: 800;\n  line-height: 0.95;\n  letter-spacing: -0.03em;\n  color: var(--white);\n  margin-bottom: 36px;\n}\n#contact .contact-heading span { color: var(--gold2); font-style: italic; }\n#contact .contact-sub {\n  font-size: 17px;\n  color: var(--muted);\n  font-weight: 300;\n  line-height: 1.75;\n  max-width: 560px;\n  margin-bottom: 60px;\n}\n#contact .contact-cards {\n  display: flex;\n  gap: 16px;\n  flex-wrap: wrap;\n  margin-bottom: 52px;\n}\n#contact .contact-card {\n  background: var(--bg3);\n  border: 1px solid var(--border);\n  padding: 28px 36px;\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  text-decoration: none;\n  transition: border-color 0.2s, transform 0.2s;\n  min-width: 220px;\n}\n#contact .contact-card:hover {\n  border-color: var(--gold);\n  transform: translateY(-3px);\n}\n#contact .cc-label {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold2);\n}\n#contact .cc-value {\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--white);\n}\n#contact .avail {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--gold2);\n  letter-spacing: 0.06em;\n}\n#contact .avail-dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--gold2);\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50% { opacity: 0.3; transform: scale(0.7); }\n}\n\n/* ── FOOTER ── */\nfooter {\n  background: var(--bg);\n  border-top: 1px solid var(--border);\n  padding: 28px 60px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\nfooter .f-name {\n  font-family: var(--display);\n  font-size: 17px;\n  font-weight: 700;\n  color: rgba(240,238,232,0.3);\n}\nfooter .f-name span { color: var(--gold); }\nfooter .f-copy {\n  font-size: 13px;\n  color: rgba(240,238,232,0.2);\n  font-weight: 300;\n}\n<\u002Fstyle>\n\n\n<\u002Fhead><body>\n\n<!-- NAV -->\n<nav id=\"nav\">\n  <div class=\"nav-logo\">PJ <span>Duban<\u002Fspan><\u002Fdiv>\n  <ul class=\"nav-links\">\n    <li><a href=\"#what\">Expertise<\u002Fa><\u002Fli>\n    <li><a href=\"#who\">Industries<\u002Fa><\u002Fli>\n    <li><a href=\"#experience\">Experience<\u002Fa><\u002Fli>\n    <li><a href=\"#tools\">Tools<\u002Fa><\u002Fli>\n    <li><a href=\"#certs\">Credentials<\u002Fa><\u002Fli>\n    <li><a href=\"#testimonials\">Testimonials<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\" class=\"nav-cta\">Let's Connect<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-line\"><\u002Fdiv>\n  <!-- Centered name + photo -->\n  <div class=\"hero-center reveal\">\n    <div class=\"hero-center-left\">\n      <h1>PJ<span class=\"gold-word\">Duban<\u002Fspan><\u002Fh1>\n      <p class=\"hero-intro\">Seven years in operations and client success — managing 80+ accounts, overseeing 100+ VAs, and training 500+ agents across legal, BPO, and e-commerce. Clients stay not because of contracts, but because the work holds up.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"hero-photo-wrap\">\n      <img src=\"9ecb206e-af0f-4df8-a96a-286bb28a915b\" alt=\"PJ Duban\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Bottom content -->\n  <div class=\"hero-inner\">\n    <div class=\"hero-left reveal\">\n      <div class=\"hero-actions\">\n        <a class=\"btn-gold\" href=\"#contact\">Let's Connect<\u002Fa>\n        <a class=\"btn-ghost\" href=\"PJ Duban Resume.html\" target=\"_blank\">Download Resume ↓<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-stats reveal reveal-delay-2\">\n      <div class=\"h-stat\">\n        <div class=\"h-stat-num\">80+<\u002Fdiv>\n        <div class=\"h-stat-label\">Clients Managed<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"h-stat\">\n        <div class=\"h-stat-num\">500+<\u002Fdiv>\n        <div class=\"h-stat-label\">Agents Trained<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"h-stat\">\n        <div class=\"h-stat-num\">80%<\u002Fdiv>\n        <div class=\"h-stat-label\">Client Retention Rate<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"scroll-hint\">\n    <div class=\"scroll-line\"><\u002Fdiv>\n    Scroll to explore\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT I DO -->\n<section id=\"what\" class=\"section\">\n  <div class=\"section-label reveal\">Expertise<\u002Fdiv>\n  <div class=\"section-heading reveal\">What I Do<\u002Fdiv>\n  <p class=\"section-sub reveal\">I sit between leadership, clients, and remote teams — making sure everything runs, nothing slips, and every part of the business stays aligned.<\u002Fp>\n  <div class=\"pillars-wrap\">\n    <div class=\"pillar reveal\">\n      <div class=\"p-num\">01<\u002Fdiv>\n      <div class=\"p-title\">Client Success &amp; Account Management<\u002Fdiv>\n      <div class=\"p-desc\">End-to-end relationship management, account health monitoring, and proactive communication that keeps clients satisfied and retained long-term.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar reveal reveal-delay-1\">\n      <div class=\"p-num\">02<\u002Fdiv>\n      <div class=\"p-title\">Operations &amp; Process Optimization<\u002Fdiv>\n      <div class=\"p-desc\">Building SOPs, auditing workflows, and implementing systems that scale — so operations run without constant firefighting.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar reveal reveal-delay-2\">\n      <div class=\"p-num\">03<\u002Fdiv>\n      <div class=\"p-title\">Chief of Staff &amp; Strategic Execution<\u002Fdiv>\n      <div class=\"p-desc\">Translating leadership vision into clear, actionable plans. Protecting executive time and closing operational gaps before they become problems.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar reveal reveal-delay-1\">\n      <div class=\"p-num\">04<\u002Fdiv>\n      <div class=\"p-title\">Master Training &amp; Team Enablement<\u002Fdiv>\n      <div class=\"p-desc\">Designing and delivering training programs that build real skills, improve performance, and create a culture of continuous growth.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar reveal reveal-delay-2\">\n      <div class=\"p-num\">05<\u002Fdiv>\n      <div class=\"p-title\">HR &amp; People Management<\u002Fdiv>\n      <div class=\"p-desc\">Recruitment pipelines, onboarding systems, performance tracking, and staff transitions — handled with clarity and professionalism.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pillar reveal reveal-delay-3\">\n      <div class=\"p-num\">06<\u002Fdiv>\n      <div class=\"p-title\">Cross-Functional Program Leadership<\u002Fdiv>\n      <div class=\"p-desc\">Coordinating across HR, VA management, recruitment, and client success to ensure every initiative lands cleanly and on time.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHO I HELP -->\n<section id=\"who\" class=\"section\">\n  <div class=\"section-label reveal\">Industries<\u002Fdiv>\n  <div class=\"section-heading reveal\">Who I Help<\u002Fdiv>\n  <p class=\"section-sub reveal\">Businesses across multiple industries — each with unique remote staffing and operations challenges.<\u002Fp>\n  <div class=\"who-layout\">\n    <div class=\"who-left reveal\">\n      <div class=\"ind-list\">\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">Legal<\u002Fdiv>\n          <div class=\"ind-desc\">Law firms, intake teams, legal assistants (Clio)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">Digital Advertising<\u002Fdiv>\n          <div class=\"ind-desc\">Ad agencies scaling remote campaign teams<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">DTC / E-Commerce<\u002Fdiv>\n          <div class=\"ind-desc\">Brands needing reliable remote ops &amp; content<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">Coaching &amp; Consulting<\u002Fdiv>\n          <div class=\"ind-desc\">Coaches building scalable remote operations<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">Remote Staffing / BPO<\u002Fdiv>\n          <div class=\"ind-desc\">Staffing companies placing VAs globally<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ind-row\">\n          <div class=\"ind-name\">Call Center / Customer Service<\u002Fdiv>\n          <div class=\"ind-desc\">BPO training, team leadership &amp; performance<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"who-right reveal reveal-delay-2\">\n      <div class=\"quote-block\">\n        <div class=\"quote-text\">\"I don't just tell people what to do. I've done it myself. I've written the SOPs, managed the audits, drafted the hard emails, run the recruitment pipelines.\"<\u002Fdiv>\n        <div class=\"quote-attr\">— PJ Duban<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"law-box\">\n        <div class=\"law-title\">US Legal Practice Areas<\u002Fdiv>\n        <div class=\"law-tags\">\n          <span class=\"law-tag\">Personal Injury<\u002Fspan>\n          <span class=\"law-tag\">Lemon Law<\u002Fspan>\n          <span class=\"law-tag\">Criminal Law<\u002Fspan>\n          <span class=\"law-tag\">Slip &amp; Fall<\u002Fspan>\n          <span class=\"law-tag\">Employment Law<\u002Fspan>\n          <span class=\"law-tag\">Transactional Law<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPERIENCE -->\n<section id=\"experience\" class=\"section\">\n  <div class=\"section-label reveal\">Career<\u002Fdiv>\n  <div class=\"section-heading reveal\">Experience<\u002Fdiv>\n  <p class=\"section-sub reveal\">A track record built across remote staffing, operations, and enterprise training.<\u002Fp>\n  <div class=\"exp-timeline\">\n    <div class=\"exp-item reveal\">\n      <div class=\"exp-left\">\n        <div class=\"exp-years\">5 yrs<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"exp-dot-col\"><div class=\"exp-dot\"><\u002Fdiv><div class=\"exp-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"exp-right\">\n        <div class=\"exp-title\">Chief of Staff &amp; Performance Consultant<\u002Fdiv>\n        <div class=\"exp-desc\">Served as the connective tissue between leadership, operations, recruitment, and client success at remote staffing companies. Translated high-level strategy into actionable workflows, managed multiple client accounts end-to-end, ran recruitment pipelines, built SOPs, handled HR communications, VA deployment, client performance reviews, billing adjustments, and staff transitions. Built Monday.com and HubSpot workflows and led cross-functional coordination across HR and VA management teams.<\u002Fdiv>\n        <div class=\"exp-tags\">\n          <span class=\"exp-tag\">Chief of Staff<\u002Fspan>\n          <span class=\"exp-tag\">Operations<\u002Fspan>\n          <span class=\"exp-tag\">HR Management<\u002Fspan>\n          <span class=\"exp-tag\">Client Success<\u002Fspan>\n          <span class=\"exp-tag\">Recruitment<\u002Fspan>\n          <span class=\"exp-tag\">SOP Development<\u002Fspan>\n          <span class=\"exp-tag\">VA Management<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"exp-item reveal\">\n      <div class=\"exp-left\">\n        <div class=\"exp-years\">3 yrs<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"exp-dot-col\"><div class=\"exp-dot\"><\u002Fdiv><div class=\"exp-line\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"exp-right\">\n        <div class=\"exp-title\">Client Success Manager — Legal &amp; Multi-Industry<\u002Fdiv>\n        <div class=\"exp-desc\">Advised businesses across legal, digital advertising, DTC/e-commerce, and coaching on remote operations. Built SOPs, ran onboarding systems, coached on recruitment strategy, managed team performance, and supported law firms using Clio for intake and legal assistant workflows. Helped clients diagnose real problems — not just symptoms — and built lasting systems to fix them.<\u002Fdiv>\n        <div class=\"exp-tags\">\n          <span class=\"exp-tag\">Legal<\u002Fspan>\n
